name: Release on Tag Push

on:
  push:
    tags:
      - "v*.*.*"
      - "[0-9]*.[0-9]*.[0-9]*"
      - "v*.*.*-*"
      - "[0-9]*.[0-9]*.[0-9]*-*"

permissions:
  contents: write

concurrency:
  group: release-tag-${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolver nome da tag
        id: meta
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Verificar se release ja existe
        id: existing
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.meta.outputs.tag }}';
            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag
              });
              core.setOutput('exists', 'true');
            } catch (err) {
              if (err.status === 404) {
                core.setOutput('exists', 'false');
                return;
              }
              throw err;
            }

      - name: Gerar pacotes da release
        if: ${{ steps.existing.outputs.exists != 'true' }}
        shell: bash
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          mkdir -p dist
          git archive --format=zip --output "dist/nika-${TAG}.zip" "$TAG"
          git archive --format=tar.gz --output "dist/nika-${TAG}.tar.gz" "$TAG"

      - name: Criar GitHub Release
        if: ${{ steps.existing.outputs.exists != 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/*.zip
            dist/*.tar.gz

      - name: Release ja existente
        if: ${{ steps.existing.outputs.exists == 'true' }}
        run: echo "Release para a tag ${{ steps.meta.outputs.tag }} ja existe. Fluxo automatico ignorado sem erro."
